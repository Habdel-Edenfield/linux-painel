# Ralph Orchestrator Configuration for System Tool Orchestration
# Generated by: ralph init --backend claude
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "claude"
  prompt_mode: "arg"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 50
  max_consecutive_failures: 3
  timeout_seconds: 300
  # max_runtime_seconds: 14400    # 4 hours max

core:
  workspace_root: "/home/user/agent"
  scratchpad_path: ".ralph/agent/scratchpad.md"
  memories_path: ".ralph/agent/memories.md"
  tasks_path: ".ralph/agent/tasks.jsonl"

memories:
  enabled: true
  inject: auto              # Default: injeta memórias automaticamente em cada iteração
  budget: 0                # 0 = sem limite de tokens
  filter:
    types: []              # Vazio = todos os tipos
    tags: []               # Vazio = todas as tags
    recent: 0              # 0 = sem limite de tempo

tasks:
  enabled: true             # Habilita sistema de tarefas

skills:
  enabled: true
  dirs:
    - "./skills"                        # Skills customizadas deste workspace

hats:
  system-coordinator:
    name: "System Coordinator"
    description: "Orquestra tarefas do sistema e coordena agentes especialistas"
    triggers: ["system.orchestrate", "work.start"]
    publishes: ["system.plan_ready", "system.coordinated"]
    instructions: |
      Você é o coordenador principal do sistema. Quando uma tarefa é iniciada:
      1. Analise a requisição e determine quais hats especialistas são necessários
      2. Publique eventos apropriados para acionar os especialistas
      3. Aguarde completamento e publique system.coordinated quando terminado
      4. SEMPRE inicie com contexto fresco - não assuma estado anterior

  widget-manager:
    name: "Widget Manager"
    description: "Gerencia o ciclo de vida dos widgets do sistema (brilho, obsidian, pastas)"
    triggers: ["widget.manage", "widget.status", "widget.configure"]
    publishes: ["widget.managed", "widget.status_report"]
    instructions: |
      Você gerencia os widgets do sistema:
      - brightness-widget.py (~/.local/bin/brightness-widget.py)
      - obsidian-widget.py (~/.local/bin/obsidian-widget.py)
      - foldermenu@user.local (GNOME extension)
      - system-tools@user.local (Nova extensão GNOME Shell - WIP)

      Para operar widgets, use subprocess para executar comandos shell.
      Estado é persistido em: ~/.config/{widget-name}/

  brightness-specialist:
    name: "Brightness Specialist"
    description: "Especialista em controle de brilho e perfis de exibição"
    triggers: ["brightness.adjust", "brightness.profile", "brightness.query"]
    publishes: ["brightness.adjusted", "brightness.status"]
    instructions: |
      Você controla o brightness-widget usando subprocess:
      - Status: `ps aux | grep brightness-widget.py`
      - Config: `~/.config/brightness-widget/profiles.json`
      - Aplicar: Widget já roda, apenas modifique configs se necessário

      NOTA: Para nova extensão GNOME Shell, consulte gnome-dev-specialist.

  obsidian-specialist:
    name: "Obsidian Specialist"
    description: "Especialista em gerenciamento de vaults Obsidian"
    triggers: ["obsidian.open", "obsidian.vaults", "obsidian.manage"]
    publishes: ["obsidian.opened", "obsidian.vaults_list"]
    instructions: |
      Você gerencia o Obsidian widget:
      - Scaneia vaults em ~/Documentos, ~/personal, ~/Micologia
      - Usa protocolo obsidian:// para abrir vaults específicos
      - Config: ~/.config/obsidian/obsidian.json

      NOTA: Para nova extensão GNOME Shell, consulte gnome-dev-specialist.

  design-coordinator:
    name: "Design Coordinator"
    description: "Garante que widgets seguem padrões de design do Vitals"
    triggers: ["widget.design", "widget.validate"]
    publishes: ["design.approved", "design.needs_work"]
    instructions: |
      Você valida design de widgets contra padrões Vitals:
      - Arquitetura: GNOME Shell Extension (PanelMenu.Button), não Python GTK/AppIndicator
      - Ícones: SVG symbolic 16px com temas (original/, gnome/)
      - CSS: Classes seguindo padrão vitals-* (vitals-panel-icon-*, vitals-button-action)
      - Menus: PopupSubMenuMenuItem + bar de ações com botões redondos
      - Configuração: GSettings schema extensiva com tipos corretos (b, i, s, as)
      - Polling: GLib.timeout_add_seconds() async, não blocking loops

      Consulte: /home/user/agent/specs/VITALS-DESIGN-REFERENCE.md
      Use skill: vitals-reference

  gnome-dev-specialist:
    name: "GNOME Development Specialist"
    description: "Especialista em desenvolvimento de GNOME Shell extensions"
    triggers: ["gnome.create", "gnome.modify", "gnome.debug"]
    publishes: ["gnome.created", "gnome.modified", "gnome.debugged"]
    instructions: |
      Você desenvolve GNOME Shell extensions seguindo padrões Vitals:
      - PanelMenu.Button para panel integration
      - PopupMenu.PopupSubMenuMenuItem para submenus categoriazados
      - GSettings para configuração persistente
      - GLib.spawn_async() para comandos shell
      - Gio.icon_new_for_string() para ícones dinâmicos
      - St.BoxLayout para layouts horizontais no panel
      - GLib.timeout_add_seconds() para polling assíncrono

      Consulte: /home/user/agent/skills/vitals-reference.md
      Templates e checklists disponíveis na skill.

events:
  system.orchestrate:
    description: "Solicitação de orquestração de múltiplas operações do sistema"
    purpose: "Coordenar operações complexas envolvendo múltiplos widgets"
    expectations: "Lista de operações com dependências"

  work.start:
    description: "Uma nova tarefa de orquestração do sistema foi iniciada"
    purpose: "Trigger para o system-coordinator iniciar o workflow"
    expectations: "Descrição da tarefa com critérios de aceitação"

  widget.manage:
    description: "Solicitação de gerenciamento de widgets"
    purpose: "Iniciar, parar, ou reiniciar widgets do sistema"
    expectations: "Ação (start/stop/restart) e widget alvo"

  widget.design:
    description: "Solicitação de design de novo widget"
    purpose: "Criar widget seguindo padrões Vitals"
    expectations: "Tipo de widget (brightness, obsidian, etc.) e requisitos funcionais"

  widget.validate:
    description: "Validar design de widget contra padrões Vitals"
    purpose: "Garantir consistência de design com referência Vitals"
    expectations: "Caminho para extensão ou arquivos a validar"

  gnome.create:
    description: "Criar GNOME Shell extension"
    purpose: "Desenvolver nova extensão seguindo padrões Vitals"
    expectations: "Nome da extensão, módulos necessários, funcionalidades"

  gnome.modify:
    description: "Modificar GNOME Shell extension existente"
    purpose: "Atualizar código de extensão seguindo padrões"
    expectations: "Caminho da extensão e alterações necessárias"

  gnome.debug:
    description: "Debug GNOME Shell extension"
    purpose: "Investigar e corrigir problemas na extensão"
    expectations: "Descrição do problema e logs disponíveis"

  brightness.adjust:
    description: "Ajustar brilho do monitor"
    purpose: "Modificar níveis de brilho e gamma"
    expectations: "Valor de brilho (0.1-1.5) e gamma (R:G:B)"

  obsidian.open:
    description: "Abrir um vault específico do Obsidian"
    purpose: "Abrir vault usando protocolo obsidian://"
    expectations: "Caminho do vault ou nome do vault"

  TASK_COMPLETE:
    description: "Tarefa completada com sucesso"
    purpose: "Sinal para encerrar o loop do Ralph"
    expectations: "Resumo do que foi realizado e evidências"

# Create PROMPT.md with your task, then run: ralph run
